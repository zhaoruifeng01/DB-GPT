[system]
# Load language from environment variable(It is set by the hook)
language = "${env:DBGPT_LANG:-en}"
api_keys = []
encrypt_key = "your_secret_key"
log_level = "WARNING"
# Auth type: "mock" (default, no auth) or "db" (database-based permission)
auth_type = "db"

# Server Configurations
[service.web]
host = "0.0.0.0"
port = 5670
new_web_ui = false

[service.web.database]
type = "mysql"
host = "backup-polardb-history.rwlb.rds.aliyuncs.com"
port = 3306
database = "ekb400"
user = "sql_review"
password = "M3TTsyAhXy8Xn3PZf2vH"
pool_size = 20
max_overflow = 40
pool_timeout = 30
pool_recycle = 3600
pool_pre_ping = true

[rag.storage]
[rag.storage.vector]
type = "chroma"
persist_path = "pilot/data"

[[serves]]
type = "governance"
# Temporarily skip governance metadata schema checks for local frontend testing.
# Re-enable this when the connected MySQL database has governance_metadata_* tables.
enabled = false

# Model Configurations
[models]
[[models.llms]]
name = "glm-5.2"
provider = "proxy/openai"
api_base = "https://ai-gateway-prod.hosecloud.com/coding-plan/v1"
api_key = "${env:OPENAI_API_KEY}"

[[models.embeddings]]
name = "Qwen3-Embedding-8B"
provider = "proxy/openai"
api_url = "https://ai-gateway-prod.hosecloud.com/coding-plan-emb/v1/embeddings"
api_key = "${env:OPENAI_API_KEY}"
