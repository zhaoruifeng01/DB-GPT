[project]
name = "dbgpt-serve"
version = "0.8.1"
description = "Add your description here"
authors = [
    { name = "csunny", email = "cfqcsunny@gmail.com" }
]
license = "MIT"
readme = "README.md"
requires-python = ">= 3.10"

dependencies = [
    "dbgpt-ext",
    "apscheduler>=3.10,<4",
    # Governance is an embedded FastAPI serve and applies read-only SQL guards.
    # Keep these direct so a standalone dbgpt-serve installation is complete.
    "fastapi>=0.100.0,<0.113.0",
    "sqlparse==0.5.5",
]

[project.urls]
Homepage = "https://github.com/eosphoros-ai/DB-GPT"
Documentation = "http://docs.dbgpt.cn/docs/overview"
Repository = "https://github.com/eosphoros-ai/DB-GPT.git"
Issues = "https://github.com/eosphoros-ai/DB-GPT/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
managed = true
dev-dependencies = []

[project.optional-dependencies]
libro = ["libro>=0.1.25"]
dbgpts = ["poetry"]
permission = ["pyjwt>=2.0", "passlib[bcrypt]>=1.7"]

[tool.hatch.build.targets.wheel]
packages = ["src/dbgpt_serve"]
exclude = [
    "src/dbgpt_serve/**/tests",
    "src/dbgpt_serve/**/tests/*",
    "src/dbgpt_serve/tests",
    "src/dbgpt_serve/tests/*",
    "src/dbgpt_serve/**/examples",
    "src/dbgpt_serve/**/examples/*"
]
